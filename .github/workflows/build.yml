# Build and release workflow for Kogito IntelliJ Plugin
# - Builds plugin on push to main and pull requests
# - Automatically creates a GitHub Release with the ZIP on push to main

name: Build

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Plugin
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Free disk space for large builds
      - name: Maximize Build Space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          large-packages: false

      - name: Fetch Sources
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: src/main/resources/webui/package-lock.json

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Plugin
        run: ./gradlew buildPlugin

      - name: Verify Plugin
        run: ./gradlew verifyPlugin

      # Get plugin version from gradle.properties
      - name: Get Plugin Version
        id: version
        run: |
          VERSION=$(grep '^pluginVersion' gradle.properties | cut -d'=' -f2 | tr -d ' ')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT

      # Get the plugin filename for artifact naming
      - name: Get Plugin Filename
        id: artifact
        run: |
          cd build/distributions
          FILENAME=$(ls *.zip | head -1)
          echo "filename=${FILENAME}" >> $GITHUB_OUTPUT
          echo "name=${FILENAME%.zip}" >> $GITHUB_OUTPUT

      # Upload as build artifact (available for download from Actions tab)
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: build/distributions/*.zip

      # Create GitHub Release with ZIP attached (only on push to main)
      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"

          # Check if release already exists
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release $TAG already exists, updating assets..."
            gh release upload "$TAG" build/distributions/*.zip --clobber
          else
            echo "Creating new release $TAG..."
            # Extract changelog for this version
            NOTES=$(sed -n "/## \[${{ steps.version.outputs.version }}\]/,/## \[/p" CHANGELOG.md | sed '$d' | tail -n +2)

            if [ -z "$NOTES" ]; then
              NOTES="Release $TAG"
            fi

            gh release create "$TAG" \
              --title "$TAG" \
              --notes "$NOTES" \
              build/distributions/*.zip
          fi
